<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Case 1 – Court Protocol</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --cream: #f7f3ec;
      --dark: #1a1a18;
      --wool-white: #fdfaf5;
      --accent: #8c6e3f;
      --accent-light: #c9a96e;
      --light-border: #ddd5c3;
      --green: #4a6741;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--cream);
      font-family: 'Lora', serif;
      color: var(--dark);
      padding: 2rem;
    }

    header {
      background: var(--wool-white);
      border: 1.5px solid var(--light-border);
      padding: 2rem;
      border-radius: 3px;
      margin-bottom: 2rem;
      position: relative;
    }

    header::after {
      content:'';
      height:4px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      position:absolute;
      left:0; right:0; bottom:0;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }

    .sub {
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .block {
      background: var(--wool-white);
      border: 1.5px solid var(--light-border);
      border-radius: 3px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 1.5rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    ul {
      padding-left: 1.2rem;
      line-height: 1.7;
    }

    .verdict {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--green);
    }

    .badge {
      display:inline-block;
      margin-top: 0.8rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid #c4d9c2;
      background: #e8f0e7;
      color: var(--green);
      border-radius: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    footer {
      text-align:center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color:#777;
    }
  </style>
</head>

<body>

<header>
  <h1>Case 1: Sheep Association vs The distracted shepherding trio</h1>
  <div class="sub">Court Protocol Document</div>
</header>

<section class="block">

  </ul>

<section class="block">

  <div class="verdict">.</div>
  <div class="badge">Closed-door ruling</div>
</section>

<footer>
  Sheep Association Court · Official Protocol Archive
</footer>

</body>
</html>
